<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign in — Simo</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .loginWrap{height:100vh;display:grid;place-items:center;padding:18px}
    .loginCard{
      width:min(560px, calc(100% - 24px));
      border:1px solid rgba(255,255,255,.12);
      background: rgba(15,22,38,.92);
      border-radius:18px;
      box-shadow: 0 18px 45px rgba(0,0,0,.45);
      padding:18px;
    }
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .btn{
      flex:1;
      min-width:220px;
      border:none;
      border-radius:14px;
      padding:12px 12px;
      cursor:pointer;
      font-weight:900;
      background: rgba(10,14,24,.55);
      border:1px solid rgba(255,255,255,.12);
      color:#eaf0ff;
    }
    .btn:hover{background: rgba(10,14,24,.75)}
    .btn.primary{
      background: linear-gradient(90deg, rgba(255,79,216,.9), rgba(168,85,255,.9));
      border:none;
    }
    .muted{color:#a4b1d3}
    input{
      width:100%;
      height:48px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(10,14,24,.55);
      color:#eaf0ff;
      padding:0 14px;
      margin-top:10px;
      outline:none;
    }
  </style>
</head>
<body>
  <div class="loginWrap">
    <div class="loginCard">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div style="font-weight:900;font-size:20px">Sign in to Simo</div>
        <a class="pill" href="/" style="text-decoration:none;display:inline-block">← Back</a>
      </div>
      <div class="muted" style="margin-top:8px">
        Sign in to save your plan (Free / Pro / Team) and unlock downloads, library, and team features across devices.
      </div>

      <div class="row">
        <a class="btn primary" href="/auth/google" style="text-decoration:none;display:grid;place-items:center">
          Continue with Google
        </a>
        <button class="btn" id="appleBtn" disabled title="Apple login will be enabled after Apple credentials are added">
          Continue with Apple (coming next)
        </button>
      </div>

      <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,.10);padding-top:14px">
        <div style="font-weight:900">Email (simple + reliable)</div>
        <div class="muted" style="margin-top:6px">This is a temporary fallback while we wire Apple fully.</div>

        <form method="POST" action="/auth/email">
          <input name="email" type="email" placeholder="Email" required />
          <input name="password" type="password" placeholder="Password (min 6 chars)" required />
          <div class="row">
            <button class="btn primary" type="submit">Create / Sign in</button>
            <a class="btn" href="/logout" style="text-decoration:none;display:grid;place-items:center">Sign out</a>
          </div>
        </form>

        {% if error %}
          <div style="margin-top:10px;color:#ffb3b3">{{ error }}</div>
        {% endif %}
      </div>
    </div>
  </div>
</body>
</html>
